name: CI

on:
  pull_request:
    branches: [main, develop]
    paths: ['frontend/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax (source files)
        run: |
          find src -name '*.js' -exec node --check {} \;
          echo "All source JS syntax checks passed"

      - name: Build
        run: npm run build

      - name: Validate build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html not found after build"
            exit 1
          fi
          echo "Build output validated"

      - name: Check built JS syntax
        run: |
          find dist/assets -name '*.js' -exec node --check {} \;
          echo "All built JS syntax checks passed"

      - name: Validate PWA Manifest
        run: |
          if [ ! -f public/manifest.json ]; then
            echo "::warning::public/manifest.json not found — PWA will not work"
          else
            python3 -c "import json; json.load(open('public/manifest.json'))"
            echo "manifest.json valid JSON"
          fi
