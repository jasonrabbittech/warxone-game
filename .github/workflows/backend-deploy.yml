name: Backend Deploy

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:
    inputs:
      function:
        description: 'Function to deploy (e.g. auth-login, all)'
        required: false
        default: 'all'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --production

      - name: Validate JavaScript syntax
        run: |
          # Check all function handlers
          for dir in function/*/; do
            func_name=$(basename "$dir")
            echo "Checking $func_name/index.js..."
            node --check "$dir/index.js"
          done
          # Check shared modules
          for f in shared/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done
          echo "All syntax checks passed"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tencent Cloud SDK
        run: pip install tencentcloud-sdk-python

      - name: Package and Deploy SCF Functions
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
          TENCENTCLOUD_REGION: ap-hongkong
          DEPLOY_FUNCTION: ${{ github.event.inputs.function || 'all' }}
          APPID: '1376958570'
        run: |
          python3 -c "
          import os, sys, json, zipfile, tempfile, shutil
          from pathlib import Path

          # Tencent Cloud SDK
          from tencentcloud.common import credential
          from tencentcloud.common.profile.client_profile import ClientProfile
          from tencentcloud.common.profile.http_profile import HttpProfile
          from tencentcloud.scf.v20180416 import scf_client, models as scf_models

          SECRET_ID = os.environ['TENCENTCLOUD_SECRET_ID']
          SECRET_KEY = os.environ['TENCENTCLOUD_SECRET_KEY']
          REGION = os.environ['TENCENTCLOUD_REGION']
          DEPLOY_FUNC = os.environ['DEPLOY_FUNCTION'].lower()

          ALL_FUNCTIONS = [
              'auth-register', 'auth-login', 'auth-google',
              'auth-refresh', 'auth-logout',
              'game-save', 'game-load', 'game-delete',
              'quiz-start', 'quiz-submit', 'quiz-results',
              'quiz-daily-status',
              'admin-quiz-list', 'admin-quiz-create',
              'admin-quiz-update', 'admin-quiz-delete',
          ]

          if DEPLOY_FUNC == 'all' or DEPLOY_FUNC == '':
              functions = ALL_FUNCTIONS
          elif DEPLOY_FUNC in ALL_FUNCTIONS:
              functions = [DEPLOY_FUNC]
          else:
              print(f'ERROR: Unknown function {DEPLOY_FUNC}')
              print(f'Valid options: {ALL_FUNCTIONS}')
              sys.exit(1)

          print(f'Deploying functions: {functions}')

          # Setup credentials
          cred = credential.Credential(SECRET_ID, SECRET_KEY)
          http_profile = HttpProfile()
          client_profile = ClientProfile(httpProfile=http_profile)

          # SCF client
          scf = scf_client.ScfClient(cred, REGION, client_profile)

          # Package and deploy each function
          backend_dir = Path('.')

          for func in functions:
              print(f'\n=== Packaging warxone-{func} ===')

              func_dir = backend_dir / 'function' / func
              shared_dir = backend_dir / 'shared'
              node_modules = backend_dir / 'node_modules'

              if not func_dir.exists():
                  print(f'  ERROR: Function directory not found: {func_dir}')
                  continue

              # Create temp package directory
              pkg_dir = Path(tempfile.mkdtemp(prefix=f'warxone-{func}-'))
              try:
                  # Copy function code
                  shutil.copy2(func_dir / 'index.js', pkg_dir / 'index.js')

                  # Copy shared modules
                  shared_pkg = pkg_dir / 'shared'
                  shared_pkg.mkdir()
                  for f in shared_dir.glob('*.js'):
                      shutil.copy2(f, shared_pkg / f.name)

                  # Copy node_modules
                  if node_modules.exists():
                      shutil.copytree(node_modules, pkg_dir / 'node_modules')

                  # Create zip
                  zip_path = Path(tempfile.gettempdir()) / f'warxone-{func}.zip'
                  with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
                      for file_path in pkg_dir.rglob('*'):
                          if file_path.is_file():
                              arcname = file_path.relative_to(pkg_dir)
                              zf.write(file_path, arcname)

                  zip_size = zip_path.stat().st_size
                  print(f'  Created: warxone-{func}.zip ({zip_size / 1024:.1f} KB)')

                  # Read zip as base64 for direct upload
                  import base64
                  with open(zip_path, 'rb') as f:
                      zip_bytes = f.read()
                  zip_b64 = base64.b64encode(zip_bytes).decode('utf-8')

                  # Update function code directly via SCF API
                  # (Using ZipFile base64 upload — avoids COS dependency)
                  print(f'  Updating SCF function warxone-{func}...')
                  req = scf_models.UpdateFunctionCodeRequest()
                  req.FunctionName = f'warxone-{func}'
                  req.ZipFile = zip_b64
                  req.Handler = 'index.main_handler'

                  try:
                      resp = scf.UpdateFunctionCode(req)
                      print(f'  SUCCESS: warxone-{func} updated (RequestId: {resp.RequestId})')
                  except Exception as e:
                      print(f'  FAILED: warxone-{func} update error: {e}')
                      continue

              finally:
                  # Cleanup temp dir
                  shutil.rmtree(pkg_dir, ignore_errors=True)

          print('\n=== Deploy Complete ===')
          "

      - name: Verify Function URLs
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
          TENCENTCLOUD_REGION: ap-hongkong
        run: |
          python3 -c "
          import os, json
          from tencentcloud.common import credential
          from tencentcloud.common.profile.client_profile import ClientProfile
          from tencentcloud.common.profile.http_profile import HttpProfile
          from tencentcloud.scf.v20180416 import scf_client, models as scf_models

          cred = credential.Credential(os.environ['TENCENTCLOUD_SECRET_ID'], os.environ['TENCENTCLOUD_SECRET_KEY'])
          http_profile = HttpProfile()
          client_profile = ClientProfile(httpProfile=http_profile)
          scf = scf_client.ScfClient(cred, os.environ['TENCENTCLOUD_REGION'], client_profile)

          ALL_FUNCTIONS = [
              'auth-register', 'auth-login', 'auth-google',
              'auth-refresh', 'auth-logout',
              'game-save', 'game-load', 'game-delete',
              'quiz-start', 'quiz-submit', 'quiz-results',
              'quiz-daily-status',
              'admin-quiz-list', 'admin-quiz-create',
              'admin-quiz-update', 'admin-quiz-delete',
          ]

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')

          with open(summary_path, 'a') as summary:
              summary.write('## SCF Function URLs\n\n')
              summary.write('| Function | URL |\n')
              summary.write('|----------|-----|\n')

              for func in ALL_FUNCTIONS:
                  try:
                      req = scf_models.ListTriggersRequest()
                      req.FunctionName = f'warxone-{func}'
                      resp = scf.ListTriggers(req)

                      for trigger in resp.Triggers:
                          if trigger.Type == 'http':
                              desc = json.loads(trigger.TriggerDesc)
                              net = desc.get('NetConfig', {})
                              url = net.get('ExtranetUrl') or net.get('Url') or net.get('IntranetUrl', 'N/A')
                              print(f'  warxone-{func}: {url}')
                              summary.write(f'| warxone-{func} | {url} |\n')
                              break
                  except Exception as e:
                      print(f'  warxone-{func}: ERROR - {e}')

          print('\nAll function URLs verified.')
          "
